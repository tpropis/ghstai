version: "3.9"

services:
  proxy:
    build: ./services/proxy
    ports:
      - "5000:5000"
    restart: unless-stopped

  dashboard:
    build: ./services/dashboard
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./services/dashboard:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_PROXY_BASE=
